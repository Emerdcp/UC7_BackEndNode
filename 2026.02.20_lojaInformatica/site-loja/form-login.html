<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loja do Zé</title>
    <link href="https://fonts.googleapis.com/css?family=Lato:300,400,700&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css">
</head>

<body>

    <section class="ftco-section bg-light">
        <div class="container">
            <div class="row justify-content-center vh-100 align-items-center">
                <div class="col-md-6 col-lg-4 p-5 bg-white shadow">
                    <div class="login-wrap p-0">
                        <h3 class=" text-center">Area de Cadastro</h3>
                        <p class="w-100 mb-4 text-center">Realize o cadastro de usuarios</p>
                        <form action="#" id="form-usuario" class="signin-form">
                            <div class="form-group mb-3">
                                <input type="email" class="form-control" id="usuario" placeholder="E-mail" required>
                            </div>
                            <div class="form-group mb-3">
                                <input type="password" id="senha" class="form-control" placeholder="Senha" required>

                            </div>
                            <div class="form-group mb-3">
                                <input type="text" id="nome" class="form-control" placeholder="Nome" required>

                            </div>
                            <div class="form-group mb-3">
                                <input type="text" id="sobrenome" class="form-control" placeholder="Sobrenome" required>

                            </div>
                            <div class="form-group mb-3">
                                <input type="text" id="cidade" class="form-control" placeholder="Cidade" required>

                            </div>
                            <div class="form-group mb-3">
                                <input type="text" id="estado" class="form-control" placeholder="Estado" required>

                            </div>
                            <select class="form-select mb-5" id="permissaoUsuario"
                                aria-label="Floating label select example">
                                <option disabled selected>Selecione o tipo de usuario</option>
                                <option value="admin">Admin</option>
                                <option value="vendedor">Vendedor</option>
                            </select>
                            <div class="form-group mb-2">
                                <button type="button" id="btn-cadastrarUsuario"
                                    class="form-control btn btn-primary submit px-3">Cadastrar Usuario</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <script src="app-form-login.js"></script>


</body>

</html>
