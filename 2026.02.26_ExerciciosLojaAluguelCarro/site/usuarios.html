<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Painel do Sistema</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="estilo.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>

<body>

    <div class="d-flex">

        <div class="bg-dark text-white p-3" style="width:250px; min-height:100vh;">
            <h4 class="text-center">Sistema</h4>
            <hr>

            <ul class="nav flex-column">
                <li class="nav-item">
                    <a href="usuarios.html" class="nav-link text-white">Usuários</a>
                </li>

                <li class="nav-item">
                    <a href="veiculos.html" class="nav-link text-white">Veículos</a>
                </li>

                <li class="nav-item">
                    <a href="agendamentos.html" class="nav-link text-white">Agendamentos</a>
                </li>

                <li class="nav-item mt-4">
                    <a href="index.html" class="nav-link text-danger">Sair</a>
                </li>
            </ul>
        </div>

        <!-- CONTEÚDO -->
        <div class="p-4 flex-fill">

            <h2>Cadastro de Usuários</h2>

            <button class="btn btn-primary mb-3" onclick="abrirModalUsuario()">
                Cadastrar Usuário
            </button>

            <div class="row" id="usuarios"></div>

        </div>


        <!-- MODAL -->
        <form id="formUsuario">

            <div id="modalUsuario" class="modal-sistema hidden">

                <div class="modal-content">

                    <h4>Novo Usuário</h4>

                    <input type="hidden" id="id">

                    <div class="mb-3">
                        <label>Nome</label>
                        <input type="text" id="nome" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label>E-mail</label>
                        <input type="text" id="email" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label>Senha</label>
                        <input type="password" id="senha" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label>Nível de acesso</label>
                        <select id="nivel_acesso" class="form-select">
                            <option value="A">Administrador</option>
                            <option value="O">Operador</option>
                        </select>
                    </div>

                    <button class="btn btn-success" type="button" id="salvar-usuario">Salvar</button>
                    <button class="btn btn-secondary" type="button" onclick="fecharModalUsuario()">Cancelar</button>
                </div>
            </div>
        </form>
    </div>

    <script src="app-usuarios.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous">
    </script>

</body>

</html>
